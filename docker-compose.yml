services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      ENVIRONMENT: local
      LOG_FORMAT: json
    ports:
      - "8000:8000"
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ping', timeout=2)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
